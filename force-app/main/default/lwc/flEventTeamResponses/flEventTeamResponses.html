<template>
  <div class="child-container">
    <div class="child-header">
      <div
        class="header-content slds-grid slds-grid_align-spread slds-grid_vertical-align-center"
      >
        <!-- Left: title + type toggle pills -->
        <div class="header-left slds-grid slds-grid_vertical-align-center">
          <h2>{eventName} Responses</h2>
          <div class="type-toggle slds-m-left_small">
            <button class={questionsButtonClass} onclick={selectQuestions}>
              Questions
            </button>
            <button class={prayerButtonClass} onclick={selectPrayer}>
              Prayer
            </button>
            <button class={feedbackButtonClass} onclick={selectFeedback}>
              Feedback
            </button>
          </div>
        </div>
        <!-- Right: filter/action buttons -->
        <div class="header-actions slds-grid slds-grid_vertical-align-center">
          <template lwc:if={isNotFeedback}>
            <lightning-button-icon-stateful
              icon-name="utility:user"
              selected={filterMine}
              onclick={handleMyFilterChange}
              variant="border-filled"
              alternative-text="Filter by Mine"
              class="slds-m-right_x-small filter-button"
            >
            </lightning-button-icon-stateful>
            <lightning-button-menu
              icon-name="utility:filterList"
              variant="border-filled"
              alternative-text="Filter by Status"
              onselect={handleStatusChange}
              class="slds-m-right_x-small menu-button-white"
            >
              <template for:each={statusOptions} for:item="opt">
                <lightning-menu-item
                  key={opt.value}
                  value={opt.value}
                  label={opt.label}
                ></lightning-menu-item>
              </template>
            </lightning-button-menu>
          </template>
          <lightning-button-icon
            icon-name="utility:back"
            variant="border-filled"
            alternative-text="Back"
            onclick={handleBack}
            class="slds-m-right_x-small back-header-icon"
          >
          </lightning-button-icon>
          <lightning-button-icon
            icon-name="utility:refresh"
            variant="border-filled"
            alternative-text="Refresh List"
            onclick={handleRefresh}
            class="refresh-button"
          >
          </lightning-button-icon>
        </div>
      </div>
    </div>

    <div class="child-body">
      <template lwc:if={isLoading}>
        <div class="slds-is-relative slds-p-around_large">
          <lightning-spinner
            alternative-text="Loading"
            size="medium"
          ></lightning-spinner>
        </div>
      </template>
      <template lwc:elseif={isFeedback}>
        <c-fl-event-feedback event-id={eventId} event-name={eventName}>
        </c-fl-event-feedback>
      </template>
      <template lwc:else>
        <div class="results-container scrollable-wrapper">
          <template lwc:if={hasResults}>
            <ul class="response-list">
              <template for:each={filteredItems} for:item="item">
                <li key={item.Id} class="response-item">
                  <div
                    class="response-header slds-grid slds-grid_vertical-align-center slds-grid_align-spread"
                  >
                    <div class="slds-truncate">
                      <a
                        href="javascript:void(0)"
                        onclick={handleNameClick}
                        data-record-id={item.Id}
                        class="wtr-link slds-text-heading_small"
                      >
                        {item.Name}
                      </a>
                      <div
                        class="date-stamp slds-text-color_weak slds-m-top_xx-small"
                      >
                        <lightning-formatted-date-time
                          value={item.CreatedDate}
                          year="2-digit"
                          month="numeric"
                          day="numeric"
                          hour="2-digit"
                          minute="2-digit"
                        ></lightning-formatted-date-time>
                        <span class="slds-m-horizontal_xx-small">&bull;</span>
                        <span>{item.Status__c}</span>
                        <template lwc:if={item.Owner}>
                          <span class="slds-m-horizontal_xx-small">&bull;</span>
                          <span>{item.Owner.Name}</span>
                        </template>
                      </div>
                    </div>
                    <div class="slds-no-flex">
                      <lightning-button
                        label="Claim"
                        variant="neutral"
                        icon-name="utility:check"
                        icon-position="left"
                        onclick={handleClaim}
                        data-id={item.Id}
                        class="claim-button"
                      >
                      </lightning-button>
                    </div>
                  </div>
                  <div class="response-text slds-m-top_small">
                    "{item.responseText}"
                  </div>
                </li>
              </template>
            </ul>
          </template>
          <template lwc:else>
            <div class="slds-text-align_center slds-p-around_medium text-weak">
              <lightning-icon
                icon-name="utility:filter"
                size="medium"
                class="slds-m-bottom_small"
              ></lightning-icon>
              <p>No {selectedTypeLabel} found matching your filters.</p>
            </div>
          </template>
        </div>
      </template>
    </div>
  </div>
</template>
